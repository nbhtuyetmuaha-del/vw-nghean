<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - VW Nghệ An</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-blue-900">Hệ Thống Quản Trị - Tường Vân</h1>
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold">Đã kết nối Firebase</span>
        </div>
        
        <form id="dashboardForm" class="space-y-6">
            <!-- Quản lý thông tin chung -->
            <div class="bg-gray-50 p-4 rounded border">
                <h2 class="font-semibold text-lg mb-4">1. Thông tin chung (Hiển thị đầu trang)</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tiêu đề trang chủ</label>
                        <input type="text" id="mainHeadline" class="mt-1 w-full border border-gray-300 rounded-md p-2" placeholder="Sở hữu Volkswagen đẳng cấp Đức...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Số Hotline hiển thị</label>
                        <input type="text" id="hotline" class="mt-1 w-full border border-gray-300 rounded-md p-2" value="0559 260 268">
                    </div>
                </div>
            </div>

            <!-- Quản lý Xe nổi bật -->
            <div class="bg-gray-50 p-4 rounded border">
                <h2 class="font-semibold text-lg mb-4">2. Cập nhật dòng xe đang "Hot" nhất</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tên Dòng Xe</label>
                        <input type="text" id="carName" class="mt-1 w-full border border-gray-300 rounded-md p-2" placeholder="Ví dụ: Teramont President 2026">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Giá Bán Niêm Yết (VNĐ)</label>
                        <input type="text" id="carPrice" class="mt-1 w-full border border-gray-300 rounded-md p-2" placeholder="2.488.000.000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Chương trình khuyến mãi nổi bật</label>
                        <textarea id="carPromo" class="mt-1 w-full border border-gray-300 rounded-md p-2" rows="2" placeholder="Giảm 100% trước bạ..."></textarea>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition uppercase">
                Lưu & Cập Nhật Lên Trang Chủ
            </button>
        </form>
        <div id="statusMsg" class="mt-4 p-3 rounded hidden font-medium text-center"></div>
    </div>

    <script type="module">
        // Import thư viện Firebase trực tiếp trên web
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyCIeeSuYcn8bTsuTxMqHepi7_1-LxIbD_M",
            authDomain: "vw-nghean-website.firebaseapp.com",
            projectId: "vw-nghean-website",
            storageBucket: "vw-nghean-website.firebasestorage.app",
            messagingSenderId: "850006345393",
            appId: "1:850006345393:web:f02b92441d3215cbec0490",
            measurementId: "G-S92BXXGXZD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "settings", "homepage");

        // Hàm tự động tải dữ liệu cũ lên Form
        async function loadCurrentData() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('mainHeadline').value = data.headline || '';
                    document.getElementById('hotline').value = data.hotline || '0559 260 268';
                    document.getElementById('carName').value = data.carName || '';
                    document.getElementById('carPrice').value = data.carPrice || '';
                    document.getElementById('carPromo').value = data.carPromo || '';
                }
            } catch (error) {
                console.log("Chưa có dữ liệu hoặc đang chờ tạo mới: ", error);
            }
        }
        loadCurrentData();

        // Xử lý khi bấm nút Cập nhật
        document.getElementById('dashboardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "ĐANG LƯU DỮ LIỆU...";
            
            try {
                await setDoc(docRef, {
                    headline: document.getElementById('mainHeadline').value,
                    hotline: document.getElementById('hotline').value,
                    carName: document.getElementById('carName').value,
                    carPrice: document.getElementById('carPrice').value,
                    carPromo: document.getElementById('carPromo').value,
                    updatedAt: new Date().toISOString()
                });
                
                const msg = document.getElementById('statusMsg');
                msg.textContent = "✅ Đã lưu thành công! Hãy mở trang chủ ra xem nhé.";
                msg.className = "mt-4 p-3 rounded bg-green-100 text-green-700 font-medium text-center block";
                btn.innerText = "LƯU & CẬP NHẬT LÊN TRANG CHỦ";
                
                setTimeout(() => msg.classList.add('hidden'), 5000);
            } catch (error) {
                console.error("Lỗi:", error);
                alert("Lỗi lưu dữ liệu: Bạn đã chọn 'Start in Test mode' trong Firestore chưa?");
                btn.innerText = "THỬ LẠI";
            }
        });
    </script>
</body>
</html>
