<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Trị Động - VW Nghệ An</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .loader { border-top-color: #eb6e00; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; } @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-[#001e50] z-50 fixed inset-0">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-[#001e50] mb-6">Đăng Nhập Quản Trị</h2>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" placeholder="Tên đăng nhập (admin)" required class="w-full border p-3 rounded">
                <input type="password" id="password" placeholder="Mật khẩu (vw2026)" required class="w-full border p-3 rounded">
                <p id="loginError" class="text-red-500 text-sm hidden">Sai thông tin!</p>
                <button type="submit" class="w-full bg-[#eb6e00] text-white font-bold py-3 rounded">ĐĂNG NHẬP</button>
            </form>
        </div>
    </div>

    <div id="adminDashboard" class="hidden">
        <div class="bg-[#001e50] text-white p-4 shadow-md sticky top-0 z-40">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold"><i class="fa-solid fa-gear mr-2"></i>CMS - Tùy Biến Giao Diện</h1>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold">Thoát</button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto mt-8 px-4 space-y-8">
            
            <div class="bg-white p-6 rounded-xl shadow border-t-4 border-[#001e50]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-[#001e50]">1. Danh Sách Ảnh Bìa (Banner Slider)</h2>
                    <button id="addBannerBtn" class="bg-blue-600 text-white px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus mr-1"></i> Thêm Ảnh Bìa</button>
                </div>
                <div id="bannerContainer" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow border-t-4 border-[#eb6e00]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-[#001e50]">2. Danh Sách Sản Phẩm (Hiển thị dạng lưới)</h2>
                    <button id="addCarBtn" class="bg-[#eb6e00] text-white px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus mr-1"></i> Thêm Dòng Xe</button>
                </div>
                <div id="carContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div class="sticky bottom-4 z-40">
                <button id="saveBtn" class="w-full bg-green-600 hover:bg-green-700 shadow-2xl text-white font-bold py-4 rounded-xl text-lg uppercase flex justify-center items-center">
                    <i class="fa-solid fa-floppy-disk mr-2"></i> LƯU VÀ CẬP NHẬT TRANG CHỦ
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // Import module Storage để tải ảnh
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIeeSuYcn8bTsuTxMqHepi7_1-LxIbD_M",
            authDomain: "vw-nghean-website.firebaseapp.com",
            projectId: "vw-nghean-website",
            storageBucket: "vw-nghean-website.firebasestorage.app",
            messagingSenderId: "850006345393",
            appId: "1:850006345393:web:f02b92441d3215cbec0490"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const docRef = doc(db, "settings", "dynamic_data");

        // ĐĂNG NHẬP
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'vw2026') {
                sessionStorage.setItem('isCMSAdmin', 'true');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                loadData();
            } else document.getElementById('loginError').classList.remove('hidden');
        };
        if(sessionStorage.getItem('isCMSAdmin') === 'true') {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadData();
        }
        window.logout = () => { sessionStorage.clear(); location.reload(); }

        // --- GIAO DIỆN HTML CHO TỪNG ITEM ---
        const bannerContainer = document.getElementById('bannerContainer');
        const carContainer = document.getElementById('carContainer');

        function createBannerHTML(url = '') {
            return `
            <div class="banner-item bg-gray-50 border p-4 rounded flex items-end gap-4 relative">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-1">🔗 Link Ảnh Bìa</label>
                    <input type="text" value="${url}" class="url-input w-full border p-2 rounded text-sm mb-2" placeholder="Dán link hoặc bấm nút bên cạnh tải lên...">
                    <label class="block text-xs font-semibold text-blue-600 cursor-pointer">
                        <i class="fa-solid fa-upload"></i> Tải ảnh từ thiết bị lên
                        <input type="file" accept="image/*" class="file-upload hidden">
                    </label>
                </div>
                <img src="${url || 'https://placehold.co/100x50?text=Banner'}" class="preview-img w-32 h-16 object-cover border rounded bg-white">
                <button type="button" class="delete-btn absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded"><i class="fa-solid fa-trash"></i></button>
            </div>`;
        }

        function createCarHTML(car = {name:'', price:'', img:''}) {
            return `
            <div class="car-item bg-gray-50 border border-gray-200 p-4 rounded shadow-sm relative">
                <button type="button" class="delete-btn absolute top-2 right-2 text-red-500 hover:bg-red-100 w-8 h-8 rounded"><i class="fa-solid fa-trash"></i></button>
                <div class="mb-3">
                    <label class="block text-sm font-bold text-[#001e50] mb-1">🚗 Tên Dòng Xe</label>
                    <input type="text" value="${car.name}" class="name-input w-full border border-gray-300 p-2 rounded text-sm" placeholder="VD: Volkswagen Teramont">
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-bold text-green-700 mb-1">💰 Giá Bán</label>
                    <input type="text" value="${car.price}" class="price-input w-full border border-green-300 p-2 rounded text-sm text-green-700 font-semibold" placeholder="VD: Giá từ: 1.998 triệu">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">🖼️ Ảnh Minh Họa</label>
                    <input type="text" value="${car.img}" class="url-input w-full border border-gray-300 p-2 rounded text-sm mb-2" placeholder="Link ảnh hoặc tải lên...">
                    <div class="flex items-center gap-3">
                        <label class="flex-1 bg-blue-50 text-blue-600 border border-blue-200 text-center text-xs font-bold py-2 rounded cursor-pointer hover:bg-blue-100">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Tải ảnh từ thiết bị
                            <input type="file" accept="image/*" class="file-upload hidden">
                        </label>
                        <img src="${car.img || 'https://placehold.co/150x100?text=Xe'}" class="preview-img w-16 h-12 object-contain bg-white border rounded">
                    </div>
                </div>
            </div>`;
        }

        // TẢI DỮ LIỆU
        async function loadData() {
            const docSnap = await getDoc(docRef);
            bannerContainer.innerHTML = ''; carContainer.innerHTML = '';
            
            if (docSnap.exists() && docSnap.data().banners) {
                const data = docSnap.data();
                data.banners.forEach(url => bannerContainer.insertAdjacentHTML('beforeend', createBannerHTML(url)));
                data.cars.forEach(car => carContainer.insertAdjacentHTML('beforeend', createCarHTML(car)));
            } else {
                // Khởi tạo mặc định nếu chưa có dữ liệu
                bannerContainer.insertAdjacentHTML('beforeend', createBannerHTML(''));
                carContainer.insertAdjacentHTML('beforeend', createCarHTML({}));
            }
        }

        // CÁC NÚT THÊM/XÓA
        document.getElementById('addBannerBtn').onclick = () => bannerContainer.insertAdjacentHTML('beforeend', createBannerHTML(''));
        document.getElementById('addCarBtn').onclick = () => carContainer.insertAdjacentHTML('beforeend', createCarHTML({}));

        document.addEventListener('click', (e) => {
            if(e.target.closest('.delete-btn')) {
                if(confirm('Bạn có chắc muốn xóa mục này?')) {
                    e.target.closest('.banner-item, .car-item').remove();
                }
            }
        });

        // XỬ LÝ UPLOAD ẢNH TỪ THIẾT BỊ LÊN FIREBASE STORAGE
        document.addEventListener('change', async (e) => {
            if(e.target.classList.contains('file-upload')) {
                const file = e.target.files[0];
                if(!file) return;

                const parent = e.target.closest('.banner-item, .car-item');
                const urlInput = parent.querySelector('.url-input');
                const imgPreview = parent.querySelector('.preview-img');
                
                urlInput.value = "Đang tải ảnh lên máy chủ...";
                try {
                    const storageRef = ref(storage, 'images/' + Date.now() + '_' + file.name);
                    await uploadBytes(storageRef, file);
                    const downloadURL = await getDownloadURL(storageRef);
                    urlInput.value = downloadURL;
                    imgPreview.src = downloadURL;
                } catch (error) {
                    alert('Lỗi tải ảnh. Bạn đã bật Firebase Storage chế độ Test mode chưa?');
                    urlInput.value = "";
                }
            }
        });

        // LƯU DỮ LIỆU LÊN FIREBASE FIRESTORE
        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="w-6 h-6 border-4 border-white border-solid rounded-full loader mr-2"></div> ĐANG LƯU...';

            const banners = Array.from(document.querySelectorAll('.banner-item .url-input'))
                                .map(input => input.value).filter(val => val !== '');
            
            const cars = Array.from(document.querySelectorAll('.car-item')).map(item => ({
                name: item.querySelector('.name-input').value,
                price: item.querySelector('.price-input').value,
                img: item.querySelector('.url-input').value
            })).filter(car => car.name !== ''); // Chỉ lưu xe có tên

            try {
                await setDoc(docRef, { banners, cars, updatedAt: new Date().toISOString() });
                alert('✅ Lưu thành công! Trang chủ đã được cập nhật số lượng sản phẩm mới.');
            } catch (error) {
                alert('Lỗi lưu dữ liệu: ' + error);
            } finally {
                btn.innerHTML = originalText;
            }
        };
    </script>
</body>
</html>
