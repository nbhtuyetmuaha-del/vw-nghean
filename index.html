<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volkswagen - Đẳng Cấp Đức</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { vwbg: '#1a1a1a', vwcard: '#222222', vwred: '#e31837', vwgreen: '#00b14f', zalo: '#0068ff' } } }
        }
    </script>
    <style>
        .slide { display: none; animation: fade 1.5s; }
        .slide.active { display: block; }
        @keyframes fade { from { opacity: 0.2; } to { opacity: 1; } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-vwbg text-white font-sans relative">

    <!-- BANNER SLIDER -->
    <header class="w-full relative h-[50vh] md:h-[70vh] overflow-hidden group" id="sliderContainer">
        <div class="absolute inset-0 z-20 flex flex-col justify-center items-center text-center p-4 pointer-events-none">
            <h1 class="text-4xl md:text-6xl font-bold uppercase tracking-widest mb-4 drop-shadow-2xl">Volkswagen</h1>
            <p class="text-lg md:text-xl text-gray-200 mb-8 drop-shadow-lg">Trải nghiệm đẳng cấp kỹ thuật Đức</p>
            <button onclick="openPopup('Chưa xác định')" class="pointer-events-auto bg-vwred hover:bg-red-700 text-white font-bold py-3 px-8 rounded shadow-lg transition">
                <i class="fa-solid fa-car-side mr-2"></i> ĐĂNG KÝ LÁI THỬ NGAY
            </button>
        </div>
        <button onclick="changeSlide(-1)" class="absolute left-4 top-1/2 z-30 bg-black/50 p-3 rounded-full hover:bg-vwred transition"><i class="fa-solid fa-chevron-left"></i></button>
        <button onclick="changeSlide(1)" class="absolute right-4 top-1/2 z-30 bg-black/50 p-3 rounded-full hover:bg-vwred transition"><i class="fa-solid fa-chevron-right"></i></button>
    </header>

    <!-- DANH SÁCH SẢN PHẨM -->
    <section class="max-w-7xl mx-auto py-16 px-4">
        <h2 class="text-3xl font-bold text-center mb-10 uppercase border-b border-gray-700 pb-4 inline-block mx-auto block w-max">Bảng Giá Các Dòng Xe</h2>
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center col-span-full py-10 text-gray-500"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i><p class="mt-2">Đang tải dữ liệu từ Google Sheets...</p></div>
        </div>
    </section>

    <!-- NÚT THẢ NỔI -->
    <div class="fixed bottom-6 left-6 z-40 flex flex-col gap-3">
        <a href="https://zalo.me/0559260268" target="_blank" class="w-14 h-14 bg-zalo rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition cursor-pointer font-bold text-xl">Zalo</a>
        <a href="tel:0559260268" class="bg-vwred rounded-full flex items-center shadow-xl hover:scale-105 transition cursor-pointer pr-4 h-12">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-vwred text-xl"><i class="fa-solid fa-phone-volume animate-pulse"></i></div>
            <span class="font-bold text-sm ml-3 drop-shadow">Hotline: 0559.260.268</span>
        </a>
    </div>

    <!-- POPUP FORM -->
    <div id="leadPopup" class="fixed inset-0 z-50 bg-black/80 hidden flex items-center justify-center p-4">
        <div class="bg-vwcard w-full max-w-lg rounded-lg border border-gray-700 relative overflow-hidden">
            <button onclick="closePopup()" class="absolute top-3 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
            <div class="p-8">
                <h2 class="text-2xl font-bold text-center uppercase mb-2">Đăng Ký Lái Thử / Báo Giá</h2>
                <form id="popupForm" class="space-y-4 mt-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="popName" required placeholder="Họ tên (Bắt buộc)" class="w-full bg-transparent border border-gray-600 rounded p-3 focus:border-vwred">
                        <input type="tel" id="popPhone" required placeholder="Điện thoại (Bắt buộc)" class="w-full bg-transparent border border-gray-600 rounded p-3 focus:border-vwred">
                    </div>
                    <select id="popCar" class="w-full bg-vwcard border border-gray-600 rounded p-3 text-white focus:outline-none focus:border-vwred appearance-none">
                        <option value="Chưa xác định">== Chọn dòng xe quan tâm ==</option>
                    </select>
                    <button type="submit" id="popSubmitBtn" class="w-full bg-vwred hover:bg-red-700 font-bold py-4 rounded transition flex justify-center uppercase mt-2">
                        Gửi Yêu Cầu Cho Chuyên Viên
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- CODE XỬ LÝ DỮ LIỆU GOOGLE SHEETS & TELEGRAM -->
    <script>
        const CSV_LINK_BANNERS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLhAzN9fKqOnDaDovxBSDbcspdnFcTnfNtMqCyuWyY9chBKiZZoHCeUN1pOCfJ7S8CQVdeoQx0-Vlw/pub?gid=0&single=true&output=csv";
        const CSV_LINK_CARS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLhAzN9fKqOnDaDovxBSDbcspdnFcTnfNtMqCyuWyY9chBKiZZoHCeUN1pOCfJ7S8CQVdeoQx0-Vlw/pub?gid=1730456102&single=true&output=csv";
        
        const TELEGRAM_BOT_TOKEN = "8640843544:AAGBNBWwBfTaydjdgtzZT-YjJxM0i6OY6vw"; 
        const TELEGRAM_CHAT_ID = "8218792935";

        let slideIndex = 0;
        let sliderInterval;

        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            return lines.map(line => line.split(',').map(cell => cell.trim()));
        }

        async function fetchBanners() {
            if(!CSV_LINK_BANNERS.includes('http')) return;
            try {
                const response = await fetch(CSV_LINK_BANNERS);
                const data = await response.text();
                const rows = parseCSV(data);
                
                const sliderContainer = document.getElementById('sliderContainer');
                document.querySelectorAll('.slide').forEach(e => e.remove()); 
                
                let bannerHTML = '';
                for(let i = 1; i < rows.length; i++) {
                    let url = rows[i][0];
                    if(url) {
                        bannerHTML += `
                        <div class="slide ${i === 1 ? 'active' : ''} absolute inset-0 w-full h-full">
                            <div class="absolute inset-0 bg-black/40 z-10"></div>
                            <img src="${url}" class="w-full h-full object-cover">
                        </div>`;
                    }
                }
                if(bannerHTML !== '') {
                    sliderContainer.insertAdjacentHTML('afterbegin', bannerHTML);
                    clearInterval(sliderInterval);
                    sliderInterval = setInterval(() => { changeSlide(1); }, 4000);
                }
            } catch (error) { console.error("Lỗi tải Banner:", error); }
        }

        async function fetchCars() {
            if(!CSV_LINK_CARS.includes('http')) return;
            try {
                const response = await fetch(CSV_LINK_CARS);
                const data = await response.text();
                const rows = parseCSV(data);
                
                const grid = document.getElementById('productGrid');
                const selectCar = document.getElementById('popCar');
                grid.innerHTML = ''; 
                
                for(let i = 1; i < rows.length; i++) {
                    if(rows[i].length >= 3) {
                        let name = rows[i][0];
                        let price = rows[i][1];
                        let img = rows[i][2];

                        // Đã thay đổi object-contain thành object-cover và tăng chiều cao (h-52)
                        grid.innerHTML += `
                        <div class="bg-vwcard rounded-lg p-4 border border-gray-800 flex flex-col justify-between hover:border-gray-500 transition">
                            <img src="${img}" class="w-full h-52 object-cover mb-4 rounded bg-black/20" onerror="this.src='https://placehold.co/600x400?text=VW'">
                            <div class="text-center">
                                <h3 class="text-lg font-bold">${name}</h3>
                                <p class="text-vwgreen font-bold text-sm mb-4">${price}</p>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="openPopup('${name}')" class="bg-vwred hover:bg-red-700 text-xs font-bold py-2 rounded"><i class="fa-solid fa-bolt mr-1"></i> NHẬN ƯU ĐÃI</button>
                                    <a href="tel:0559260268" class="border border-vwgreen text-vwgreen hover:bg-vwgreen hover:text-white text-xs font-bold py-2 rounded flex justify-center items-center"><i class="fa-solid fa-phone-volume mr-1"></i> GỌI CHỐT GIÁ</a>
                                </div>
                            </div>
                        </div>`;
                        selectCar.innerHTML += `<option value="${name}">${name}</option>`;
                    }
                }
            } catch (error) { 
                document.getElementById('productGrid').innerHTML = '<div class="col-span-full text-center text-red-500">Lỗi tải dữ liệu. Vui lòng kiểm tra lại link Google Sheets!</div>';
            }
        }

        fetchBanners();
        fetchCars();

        window.changeSlide = function(n) {
            const slides = document.querySelectorAll('.slide');
            if(slides.length === 0) return;
            slides.forEach(s => s.classList.remove('active')); 
            slideIndex = (slideIndex + n + slides.length) % slides.length; 
            slides[slideIndex].classList.add('active'); 
        }

        const popup = document.getElementById('leadPopup');
        window.openPopup = function(carName) {
            const select = document.getElementById('popCar');
            for(let i=0; i<select.options.length; i++) {
                if(select.options[i].value === carName) select.selectedIndex = i;
            }
            popup.classList.remove('hidden');
        }
        window.closePopup = function() { popup.classList.add('hidden'); }
        window.onclick = function(e) { if (e.target == popup) closePopup(); }

        document.getElementById('popupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('popSubmitBtn');
            btn.innerText = 'ĐANG GỬI...';
            const ten = document.getElementById('popName').value;
            const sdt = document.getElementById('popPhone').value;
            const xe = document.getElementById('popCar').value;
            const textMessage = `🚨 CÓ KHÁCH TỪ GOOGLE SHEETS WEB 🚨\n👤 Tên: ${ten}\n📞 SĐT: ${sdt}\n🚗 Xe: ${xe}\n⏰ Lúc: ${new Date().toLocaleString('vi-VN')}`;

            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: textMessage })
            }).then(() => {
                alert('Đã đăng ký! Tường Vân sẽ liên hệ lại ngay.');
                btn.innerText = 'ĐÃ GỬI THÀNH CÔNG';
                document.getElementById('popupForm').reset();
                setTimeout(closePopup, 1000);
            }).catch(() => { alert('Lỗi mạng, vui lòng gọi Hotline!'); btn.innerText = 'Gửi Yêu Cầu'; });
        });
    </script>
</body>
</html>
